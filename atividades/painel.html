<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Painel do professor — Atividades</title>

<!-- =========================================================================
     PAINEL DO PROFESSOR — shell genérico MULTI-ATIVIDADE.
     Projeção no telão: tipografia grande, alto contraste, responsivo.
     Um código por AULA (sessão), um seletor de atividades (abas), um polling.
     A lógica genérica está em lib/painel-core.js; cada atividade pluga um data
     file + um módulo de render (ex.: lib/painel-continuum.js) e NÃO toca aqui.
     Para acrescentar uma atividade: incluir os dois <script> dela ao final.
     Identidade visual herdada do tema editorial (paper + laranja queimado).
     Sem CDN, sem framework, fontes self-hosted.
     ========================================================================= -->

<style>
/* ---- Fontes self-hosted (mesmas do livro). ---- */
@font-face { font-family:"Playfair Display"; src:url("../fonts/PlayfairDisplay-Regular.woff2") format("woff2"); font-weight:400; font-display:swap; }
@font-face { font-family:"Playfair Display"; src:url("../fonts/PlayfairDisplay-Bold.woff2") format("woff2"); font-weight:700; font-display:swap; }
@font-face { font-family:"Inter"; src:url("../fonts/Inter-Regular.woff2") format("woff2"); font-weight:400; font-display:swap; }
@font-face { font-family:"Inter"; src:url("../fonts/Inter-Medium.woff2") format("woff2"); font-weight:500; font-display:swap; }
@font-face { font-family:"Inter"; src:url("../fonts/Inter-SemiBold.woff2") format("woff2"); font-weight:600; font-display:swap; }
@font-face { font-family:"JetBrains Mono"; src:url("../fonts/JetBrainsMono-Regular.woff2") format("woff2"); font-weight:400; font-display:swap; }

:root{
  --paper:#F9F9F7; --paper-content:#ffffff; --sidebar-bg:#f2f2ee;
  --border-color:#e5e5e0; --border-soft:#dcdcd8;
  --text-primary:#1a1a1a; --text-body:#333; --text-secondary:#444; --text-muted:#888;
  --brand:#b45309; --brand-dark:#92400e; --brand-soft:rgba(180,83,9,.08); --brand-line:rgba(180,83,9,.22);
  --live:#2f7d4f; --live-soft:rgba(47,125,79,.12);
  --font-sans:"Inter",ui-sans-serif,system-ui,sans-serif;
  --font-serif:"Playfair Display",Georgia,"Times New Roman",serif;
  --font-mono:"JetBrains Mono",ui-monospace,monospace;
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--paper); color:var(--text-body);
  font-family:var(--font-sans); line-height:1.5;
  -webkit-font-smoothing:antialiased;
  font-size:18px; /* base maior — leitura à distância */
}
.wrap{max-width:1200px; margin:0 auto; padding:24px 22px 80px}

h1{font-family:var(--font-serif); font-weight:700; color:var(--text-primary); line-height:1.1; margin:0 0 .15em; font-size:2.2rem}
.kicker{font-family:var(--font-mono); font-size:.8rem; letter-spacing:.08em; text-transform:uppercase; color:var(--brand); margin-bottom:.4em}
.muted{color:var(--text-muted)} .small{font-size:.85rem}

/* ---- Código da sessão (projetado para os alunos digitarem) ---- */
.codebox{background:var(--paper-content); border:1px solid var(--border-color); border-radius:6px;
  padding:22px 24px; margin:18px 0 4px; text-align:center}
.codebox .instr{font-size:1.05rem; color:var(--text-secondary); margin:0 0 10px}
.codebox .instr b{color:var(--text-primary)}
.code-big{font-family:var(--font-mono); font-weight:600; color:var(--brand);
  font-size:clamp(3rem, 12vw, 6rem); letter-spacing:.12em; line-height:1; margin:6px 0 16px}

/* ---- Abas de atividade (só aparecem com 2+ atividades) ---- */
.abas{display:flex; flex-wrap:wrap; gap:8px; margin:18px 0 0}
.aba{font-family:var(--font-sans); font-size:1rem; font-weight:600; cursor:pointer;
  border:1px solid var(--border-color); background:var(--paper-content); color:var(--text-secondary);
  padding:8px 16px; border-radius:20px; transition:border-color .15s, background .15s, color .15s}
.aba:hover{border-color:var(--brand)}
.aba.ativa{border-color:var(--brand); background:var(--brand-soft); color:var(--brand)}

/* ---- Barra de controle / status ---- */
.bar{display:flex; flex-wrap:wrap; gap:16px 22px; align-items:flex-end; justify-content:space-between;
  background:var(--paper-content); border:1px solid var(--border-color); border-radius:6px;
  padding:18px 20px; margin:18px 0 24px}
.field{display:flex; flex-direction:column; gap:6px}
.field label{font-size:.8rem; font-weight:600; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.04em}
.field input{font-family:var(--font-mono); font-size:1.1rem; padding:9px 12px; border:1px solid var(--border-color);
  border-radius:4px; min-width:240px; color:var(--text-primary); background:var(--paper-content)}
.field input:focus{outline:none; border-color:var(--brand)}
.status{display:flex; flex-wrap:wrap; gap:8px 20px; align-items:center; font-size:1rem}
.live{display:inline-flex; align-items:center; gap:8px; font-weight:600; color:var(--live);
  background:var(--live-soft); padding:6px 12px; border-radius:20px}
.live .dot{width:11px; height:11px; border-radius:50%; background:var(--live); animation:pulse 1.6s ease-in-out infinite}
.live.off{color:var(--text-muted); background:var(--border-color)}
.live.off .dot{background:var(--text-muted); animation:none}
@keyframes pulse{0%,100%{opacity:1; transform:scale(1)} 50%{opacity:.35; transform:scale(.7)}}
.count{font-family:var(--font-mono); color:var(--brand); font-weight:600; font-size:1.15rem}
.btn{font-family:var(--font-sans); font-size:1rem; font-weight:600; cursor:pointer;
  border:1px solid var(--brand); background:var(--brand); color:#fff; padding:10px 18px; border-radius:4px; transition:background .15s}
.btn:hover{background:var(--brand-dark); border-color:var(--brand-dark)}
.btn.ghost{background:transparent; color:var(--brand)}
.btn.ghost:hover{background:var(--brand-soft)}

.notice{background:var(--brand-soft); border:1px solid var(--brand-line); border-radius:6px;
  padding:16px 18px; margin:18px 0; color:var(--text-secondary)}

/* ---- Legenda de grupos (cor ↔ nome) ---- */
.legend{display:flex; flex-wrap:wrap; gap:8px 16px; margin:0 0 22px}
.legend .g{display:inline-flex; align-items:center; gap:8px; font-size:1rem; font-weight:500}
.legend .swatch{width:16px; height:16px; border-radius:50%; border:2px solid #fff; box-shadow:0 0 0 1px var(--border-soft)}

/* ---- Placar (genérico: grupo + cor + pontuação) ---- */
.scoreboard{background:var(--paper-content); border:1px solid var(--border-color); border-radius:6px; padding:18px 20px; margin-top:26px}
.scoreboard h2{font-family:var(--font-serif); font-size:1.5rem; margin:0 0 14px}
.score-row{display:flex; align-items:center; gap:14px; padding:10px 0; border-bottom:1px solid var(--border-color); font-size:1.15rem}
.score-row:last-child{border-bottom:none}
.score-row .rank{font-family:var(--font-mono); color:var(--text-muted); width:2.2em; text-align:right; font-size:1rem}
.score-row .swatch{width:16px; height:16px; border-radius:50%; flex:0 0 auto; border:2px solid #fff; box-shadow:0 0 0 1px var(--border-soft)}
.score-row .name{flex:1 1 auto; font-weight:600; color:var(--text-primary)}
.score-row .pts{font-family:var(--font-mono); color:var(--brand); font-weight:600}
</style>
</head>
<body>
<div class="wrap">

  <div class="kicker">Painel do professor</div>
  <h1>Atividades, ao vivo</h1>
  <p class="muted">Acompanhe as respostas dos grupos em tempo real.</p>

  <!-- Código da sessão: gerado ao carregar (painel-core.js), travado em
       localStorage e refletido em ?sessao= na URL. Alunos digitam este código. -->
  <div class="codebox">
    <p class="instr">Para entrar na atividade, os alunos acessam<br>
      <b>henriquealvarenga.com/intencionalidade</b> → <b>Atividades</b> → <b><span id="instrAtividade">—</span></b> e digitam o código:</p>
    <div class="code-big" id="codigoBig">—</div>
    <button class="btn ghost" id="novoCodigoBtn">Novo código</button>
  </div>

  <!-- Seletor de atividades (montado a partir do registry; oculto se houver 1) -->
  <div class="abas" id="abas" style="display:none"></div>

  <div class="bar">
    <div class="field">
      <label for="sessaoInput">Código da sessão (override manual)</label>
      <input type="text" id="sessaoInput" autocomplete="off" autocapitalize="characters" placeholder="código gerado acima">
    </div>
    <div class="status">
      <span class="live off" id="liveTag"><span class="dot"></span><span id="liveText">parado</span></span>
      <span><span class="count" id="grupoCount">0</span> grupo(s)</span>
      <span class="muted small" id="lastUpdate">—</span>
      <button class="btn ghost" id="refreshBtn">Atualizar agora</button>
    </div>
  </div>

  <div class="notice" id="notice" style="display:none"></div>

  <div class="legend" id="legend"></div>

  <!-- Miolo específico da atividade selecionada (desenhado pelo módulo) -->
  <div id="atividadeContainer"></div>

  <div class="scoreboard" id="scoreboardWrap" style="display:none">
    <h2>Placar dos grupos</h2>
    <div id="scoreboard"></div>
  </div>

</div>

<!-- Ordem importa. Sem CDN.
     1) config → 2) helper REST → 3) SHELL (define registrarPainel) →
     por atividade: data file + módulo de painel (chama registrarPainel).
     Acrescentar atividade = incluir os dois <script> dela aqui. -->
<script src="lib/supabase-config.js"></script>
<script src="lib/supabase.js"></script>
<script src="lib/painel-core.js"></script>

<!-- Atividade: Continuum -->
<script src="lib/continuum-data.js"></script>
<script src="lib/painel-continuum.js"></script>
</body>
</html>
