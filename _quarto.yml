    theme: theme-editorial.scss
    css: styles.css
    toc: true
    toc-depth: 3
    toc-location: right
    number-sections: false
    code-fold: true
    code-tools: false
    smooth-scroll: true
    link-external-newwindow: true
    mermaid:
      theme: neutral

execute:
  freeze: auto
  echo: false
  warning: false
  message: false
