project:
  type: website
  output-dir: docs
  # Renderiza SÓ os .qmd (todo o conteúdo do livro é .qmd — convenção do projeto).
  # Sem isso, o Quarto transformaria qualquer .md largado em atividades/ (specs,
  # planejamento) numa página .html pública. As atividades .html entram como
  # resources (copiadas), não como render.
  render:
    - "*.qmd"
    - "**/*.qmd"
  resources:
    - fonts/
    # Atividades interativas (HTML/JS puro, fora do fluxo .qmd). Publicamos só o
    # APP — páginas .html + JS compartilhado em lib/ — e NÃO o glob amplo: assim
    # specs/planejamento (.md) largados em atividades/ nunca vazam para o site.
    # NÃO inclui supabase/ (infra).
    - atividades/*.html
    - atividades/lib/

# Bibliografia e estilo de citação — nível de PROJETO.
# Definidos aqui (e não no _metadata.yml) para que o caminho seja resolvido
# relativo à raiz do projeto e as citações funcionem nas páginas que estão
# em subpastas (capitulos/, casos/, apendices/).
bibliography: references/references.bib
csl: references/csl_styles/ABNT.csl

website:
  title: "Intencionalidade, Vontade, Impulsividade e Livre Arbítrio"
  site-url: "https://henriquealvarenga.com"
  site-path: "/intencionalidade"
  favicon: favicon.ico
  bread-crumbs: false

  navbar:
    background: primary
    # Navbar minimalista: título do site (vem de website.title) + um único link
    # "Atividades", visível em todas as páginas, para quem navega pelo livro
    # achar a atividade interativa. O sidebar segue listando os capítulos; a
    # busca aparece como ícone no navbar (habilitada em sidebar.search abaixo).
    # O alvo é um resource HTML/JS puro (atividades/**), não um .qmd.
    right:
      # Decks de abertura (revealjs). Alvo é .qmd renderizado para .html —
      # o Quarto resolve o href .qmd → .html. Páginas fullscreen, sem navbar.
      - text: "Apresentação"
        menu:
          - text: "1 · Intencionalidade & Autogoverno"
            href: apresentacao/keynote1.qmd
          - text: "2 · Você escolhe o que faz? (Continuum)"
            href: apresentacao/keynote2.qmd
      - text: "Atividades"
