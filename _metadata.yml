# Metadados Globais do Projeto

# Bibliografia e CSL foram movidos para _quarto.yml (nível de PROJETO).
# Motivo: com as páginas organizadas em subpastas (capitulos/, casos/,
# apendices/), o caminho relativo aqui no _metadata.yml não era resolvido
# a partir das subpastas e o citeproc deixava as citações cruas ([@chave]).
# No _quarto.yml o caminho é resolvido relativo à raiz do projeto e vale
# para todos os documentos, em qualquer subpasta.
#   bibliography: references/references.bib
#   csl: references/csl_styles/ABNT.csl

# Configurações de linguagem
lang: pt-BR

# Autor padrão — comentado intencionalmente.
# Quando ativo, o Quarto injetava AUTOR/AFILIAÇÃO no título block de TODAS
# as páginas, poluindo a leitura num livro de capítulo único. A informação
# de autoria fica concentrada em about.qmd (página "Créditos"). Se você
# quiser exibir autor em uma página específica, basta declarar no YAML
# daquela página.
#
# author:
#   - name: "Henrique Alvarenga da Silva"
#     affiliation: "Universidade Federal de São João del-Rei (UFSJ)"
#     email: "henriquealvarenga@ufsj.edu.br"
#     orcid: "0000-0001-9799-5240"

# Configurações de citação
citation: false
citations-hover: true
footnotes-hover: true

