name: Publish Quarto Site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissões mínimas para deploy nativo do GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Garante apenas um deploy concorrente, mas não cancela runs em andamento
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ---------- Build ----------
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # Descomente o bloco abaixo se algum .qmd usar R
      # - name: Set up R
      #   uses: r-lib/actions/setup-r@v2
      #   with:
      #     r-version: '4.4.0'
      # - name: Install R dependencies
      #   uses: r-lib/actions/setup-renv@v2

      # Descomente se algum .qmd usar Python / Jupyter
      # - name: Set up Python
      #   uses: actions/setup-python@v5
      #   with:
      #     python-version: '3.11'
      # - name: Install Python dependencies
      #   run: pip install jupyter matplotlib numpy pandas

      - name: Render site
        run: quarto render

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs   # output-dir do _quarto.yml

  # ---------- Deploy ----------
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
